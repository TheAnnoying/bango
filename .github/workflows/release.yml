name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.mod

      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            EXT=".exe"
          fi

          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o bango-${{ matrix.os }}-${{ matrix.arch }}${EXT} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bango-${{ matrix.os }}-${{ matrix.arch }}
          path: bango-*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ./artifacts/*